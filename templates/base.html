<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meeting Mind</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    nav {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    nav h1 { font-size: 20px; font-weight: 700; color: #58a6ff; }
    nav p  { font-size: 13px; color: #8b949e; }
    nav a  {
      margin-left: auto;
      color: #58a6ff;
      text-decoration: none;
      font-size: 14px;
    }
    nav a:hover { text-decoration: underline; }

    .container {
      max-width: 860px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #e6edf3;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      font-family: inherit;
    }

    input[type="text"]:focus,
    textarea:focus { border-color: #58a6ff; }

    textarea { resize: vertical; min-height: 160px; }

    button {
      background: #238636;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #2ea043; }
    button:disabled {
      background: #21262d;
      color: #8b949e;
      cursor: not-allowed;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-high     { background: #3d0000; color: #ff7b72; border: 1px solid #ff7b72; }
    .badge-medium   { background: #2d2500; color: #e3b341; border: 1px solid #e3b341; }
    .badge-low      { background: #0d2d0d; color: #3fb950; border: 1px solid #3fb950; }
    .badge-unknown  { background: #1c1c2e; color: #8b949e; border: 1px solid #30363d; }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-pending    { background: #1c1c2e; color: #8b949e; }
    .status-complete   { background: #0d2d0d; color: #3fb950; }
    .status-failed     { background: #3d0000; color: #ff7b72; }
    .status-running    { background: #0d1f3c; color: #58a6ff; }
    .status-extracting_actions { background: #0d1f3c; color: #58a6ff; }
    .status-assigning_owners   { background: #0d1f3c; color: #58a6ff; }
    .status-detecting_deadlines { background: #0d1f3c; color: #a371f7; }
    .status-detecting_risks    { background: #2d1a00; color: #ffa657; }
    .status-summarizing        { background: #0d2d0d; color: #3fb950; }

    .action-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .action-card .action-text {
      font-size: 14px;
      color: #e6edf3;
      flex: 1;
    }

    .action-card .meta {
      font-size: 12px;
      color: #8b949e;
      margin-top: 4px;
    }

    .risk-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .risk-card .risk-text {
      font-size: 14px;
      color: #e6edf3;
      margin-bottom: 4px;
    }

    .risk-card .risk-meta {
      font-size: 12px;
      color: #8b949e;
    }

    .score-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
    }

    .score-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      border: 3px solid;
      flex-shrink: 0;
    }

    .score-good   { border-color: #3fb950; color: #3fb950; }
    .score-medium { border-color: #e3b341; color: #e3b341; }
    .score-bad    { border-color: #ff7b72; color: #ff7b72; }

    .summary-text {
      font-size: 14px;
      color: #8b949e;
      line-height: 1.7;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #21262d;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .job-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #21262d;
      font-size: 14px;
      gap: 12px;
    }

    .job-row:last-child { border-bottom: none; }

    .job-row .job-title {
      font-size: 14px;
      color: #e6edf3;
      margin-bottom: 3px;
    }

    .job-row .job-date {
      font-size: 12px;
      color: #8b949e;
    }

    .job-row a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 13px;
      white-space: nowrap;
    }

    .job-row a:hover { text-decoration: underline; }

    .empty-state {
      text-align: center;
      color: #8b949e;
      padding: 32px;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #ff7b72;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <nav>
    <div>
      <h1>🧠 Meeting Mind</h1>
      <p>AI-powered meeting action extractor</p>
    </div>
    <a href="/">Home</a>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
